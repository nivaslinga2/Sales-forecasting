name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8 (optional)
        run: |
          pip install flake8
          flake8 api.py --max-line-length=120 --ignore=E501,W503 || true

      - name: Test API starts successfully
        run: |
          timeout 15 uvicorn api:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/ || exit 1

      - name: Build Docker image
        run: docker build -t rossmann-forecast:latest .
